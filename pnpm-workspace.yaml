# pnpm 10+ reads project config (overrides, patches, build policy, supply-chain
# cooldown) from this file rather than package.json's "pnpm" field. The repo pins
# packageManager: pnpm@11 so Vercel/corepack use a pnpm that honors it.

# Supply-chain "cooldown": pnpm blocks installing versions published within the
# last 24h. We keep it enabled and exclude only @geoman-io, because we
# intentionally track the brand-new geoman alpha. Every other dependency is
# resolved to a cooldown-compliant (>24h-old) version, so no other excludes are
# needed — the lockfile itself satisfies the policy.
minimumReleaseAgeExclude:
  - '@geoman-io/*'

# core-js ships a postinstall that only prints a funding banner; not needed to
# build the docs site. Decline its build explicitly so pnpm doesn't fail CI on an
# "undecided" build script.
allowBuilds:
  core-js: false

# Force patched versions of transitive deps flagged by security advisories.
# Scoped to the vulnerable ranges so other major lines are left untouched.
# js-yaml: the flagged 3.x copy is pulled by gray-matter (Docusaurus' frontmatter
# parser), which calls the safeLoad/safeDump API removed in js-yaml 4, so we pair
# this override with patches/gray-matter@4.0.3.patch switching it to load/dump.
overrides:
  'serialize-javascript@<7.0.5': '^7.0.6'
  'uuid@<11.1.1': '^11.1.1'
  'js-yaml@<4.1.2': '^4.1.2'

patchedDependencies:
  gray-matter@4.0.3: patches/gray-matter@4.0.3.patch
