# core-js ships a postinstall that only prints a funding banner; it is not needed
# to build the docs site, so we explicitly acknowledge skipping its build script.
ignoredBuiltDependencies:
  - core-js

# Force patched versions of transitive deps flagged by security advisories.
# Scoped to the vulnerable ranges so other major lines are left untouched.
# js-yaml: the flagged 3.x copy is pulled by gray-matter (Docusaurus' frontmatter
# parser). gray-matter calls the safeLoad/safeDump API removed in js-yaml 4, so we
# pair this override with a patch (patches/gray-matter@4.0.3.patch) that switches it
# to the js-yaml 4 load/dump API.
overrides:
  'serialize-javascript@<7.0.5': '^7.0.6'
  'uuid@<11.1.1': '^11.1.1'
  'js-yaml@<4.1.2': '^4.1.2'

patchedDependencies:
  gray-matter@4.0.3: patches/gray-matter@4.0.3.patch
